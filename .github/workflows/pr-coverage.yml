name: PR Coverage Check (Backend)

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
      - review_requested

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    name: Backend Tests & Coverage Report

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore App/backend-api/Microsoft.GS.DPS.sln

      - name: Build backend
        run: dotnet build App/backend-api/Microsoft.GS.DPS.sln --configuration Release --no-restore

      - name: Restore test project
        run: dotnet restore App/backend-api/Microsoft.GS.DPS.Tests/Microsoft.GS.DPS.Tests.csproj

      - name: Run backend tests with coverage
        id: run_tests
        run: |
          dotnet test App/backend-api/Microsoft.GS.DPS.Tests/Microsoft.GS.DPS.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults 2>&1 | tee test-output.log
          echo "test_exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Parse test results
        if: always()
        run: |
          echo "=== Raw test output (last 20 lines) ==="
          tail -20 test-output.log || true
          echo "=== End raw output ==="

          # Parse the summary line: "Failed!  - Failed:    16, Passed:    19, Skipped:     0, Total:    35, Duration: 129 ms"
          SUMMARY_LINE=$(grep -E "(Passed|Failed).*Total:" test-output.log | tail -1 || echo "")
          echo "Summary line found: [$SUMMARY_LINE]"

          if [ -n "$SUMMARY_LINE" ]; then
            PASSED=$(echo "$SUMMARY_LINE" | grep -oE "Passed:\s*[0-9]+" | grep -oE "[0-9]+" || echo "0")
            FAILED=$(echo "$SUMMARY_LINE" | grep -oE "Failed:\s*[0-9]+" | grep -oE "[0-9]+" || echo "0")
            SKIPPED=$(echo "$SUMMARY_LINE" | grep -oE "Skipped:\s*[0-9]+" | grep -oE "[0-9]+" || echo "0")
            TOTAL=$(echo "$SUMMARY_LINE" | grep -oE "Total:\s*[0-9]+" | grep -oE "[0-9]+" || echo "0")
            DURATION=$(echo "$SUMMARY_LINE" | grep -oE "Duration:\s*[0-9]+\s*[a-z]+" | sed 's/Duration:\s*//' || echo "N/A")
          else
            PASSED="0"; FAILED="0"; SKIPPED="0"; TOTAL="0"; DURATION="N/A"
          fi

          PASSED=${PASSED:-0}; FAILED=${FAILED:-0}; SKIPPED=${SKIPPED:-0}; TOTAL=${TOTAL:-0}; DURATION=${DURATION:-N/A}

          echo "Parsed: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED, Duration=$DURATION"

          echo "TEST_TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "TEST_PASSED=$PASSED" >> $GITHUB_ENV
          echo "TEST_FAILED=$FAILED" >> $GITHUB_ENV
          echo "TEST_SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "TEST_DURATION=$DURATION" >> $GITHUB_ENV

      - name: Find and copy coverage file
        if: always()
        run: |
          if [ -d "TestResults" ]; then
            COVERAGE_FILE=$(find TestResults -name "coverage.cobertura.xml" -type f | head -n 1)
            if [ -n "$COVERAGE_FILE" ]; then
              echo "Found coverage file: $COVERAGE_FILE"
              mkdir -p coverage/backend
              cp "$COVERAGE_FILE" coverage/backend/coverage.cobertura.xml
              echo "BACKEND_COVERAGE_EXISTS=true" >> $GITHUB_ENV
            else
              echo "No coverage.cobertura.xml found"
              echo "BACKEND_COVERAGE_EXISTS=false" >> $GITHUB_ENV
            fi
          else
            echo "TestResults directory not found"
            echo "BACKEND_COVERAGE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always() && env.BACKEND_COVERAGE_EXISTS == 'true'
        with:
          name: backend-coverage
          path: coverage/backend/coverage.cobertura.xml

      - name: Parse coverage XML into per-file report
        if: always() && env.BACKEND_COVERAGE_EXISTS == 'true'
        run: |
          cat > parse_coverage.py << 'PYEOF'
          import xml.etree.ElementTree as ET
          import os, sys

          xml_path = "coverage/backend/coverage.cobertura.xml"
          if not os.path.exists(xml_path):
              print("Coverage XML not found", file=sys.stderr)
              sys.exit(1)

          tree = ET.parse(xml_path)
          root = tree.getroot()

          overall_line_rate = float(root.get("line-rate", 0))
          overall_branch_rate = float(root.get("branch-rate", 0))
          overall_pct = int(round(overall_line_rate * 100))

          # Choose badge color
          if overall_pct >= 80:
              color = "brightgreen"
          elif overall_pct >= 60:
              color = "yellow"
          elif overall_pct >= 40:
              color = "orange"
          else:
              color = "red"

          rows = []
          total_stmts = 0
          total_miss = 0

          for package in root.findall(".//package"):
              pkg_name = package.get("name", "")
              for cls in package.findall(".//class"):
                  filename = cls.get("filename", "unknown")
                  # Shorten path: just keep last 2-3 parts
                  parts = filename.replace("\\", "/").split("/")
                  short = "/".join(parts[-2:]) if len(parts) > 1 else filename

                  lines = cls.findall(".//line")
                  if not lines:
                      continue

                  stmts = len(lines)
                  hits = sum(1 for l in lines if int(l.get("hits", 0)) > 0)
                  miss = stmts - hits
                  cover = int(round((hits / stmts) * 100)) if stmts > 0 else 0

                  # Find missing line numbers
                  missing_lines = [l.get("number") for l in lines if int(l.get("hits", 0)) == 0]

                  # Group consecutive missing lines into ranges
                  ranges = []
                  if missing_lines:
                      nums = sorted(int(n) for n in missing_lines)
                      start = nums[0]
                      end = nums[0]
                      for n in nums[1:]:
                          if n == end + 1:
                              end = n
                          else:
                              ranges.append(f"{start}-{end}" if start != end else str(start))
                              start = end = n
                      ranges.append(f"{start}-{end}" if start != end else str(start))

                  # Limit missing display to avoid huge cells
                  missing_str = ", ".join(ranges[:15])
                  if len(ranges) > 15:
                      missing_str += f", ... (+{len(ranges)-15} more)"

                  total_stmts += stmts
                  total_miss += miss
                  rows.append((short, stmts, miss, cover, missing_str))

          total_cover = int(round(((total_stmts - total_miss) / total_stmts) * 100)) if total_stmts > 0 else 0

          # Write markdown
          with open("coverage-detail.md", "w") as f:
              f.write(f"![.NET Coverage](https://img.shields.io/badge/.NET_Coverage-{overall_pct}%25-{color}?style=flat&logo=dotnet)\n\n")
              f.write("<details>\n")
              f.write(f"<summary><b>.NET Test Coverage Report</b> &bull; {total_cover}%</summary>\n\n")
              f.write("| File | Stmts | Miss | Cover | Missing |\n")
              f.write("|:-----|------:|-----:|------:|:--------|\n")

              # Sort by cover ascending (worst first)
              rows.sort(key=lambda r: r[3])

              for short, stmts, miss, cover, missing_str in rows:
                  f.write(f"| {short} | {stmts} | {miss} | {cover}% | {missing_str} |\n")

              f.write(f"| **TOTAL** | **{total_stmts}** | **{total_miss}** | **{total_cover}%** | |\n")
              f.write("\n</details>\n")

          print(f"Generated coverage-detail.md: {len(rows)} files, {total_cover}% coverage")
          PYEOF
          python3 parse_coverage.py

      - name: Generate PR comment
        if: always()
        run: |
          {
            echo "# 📊 Code Coverage Report"
            echo ""
            echo "## 🎯 Backend Coverage (.NET)"
            echo ""

            if [ -f "coverage-detail.md" ]; then
              cat coverage-detail.md
              echo ""
            else
              echo "⚠️ **Coverage data not available**"
              echo ""
            fi

            echo "## 📋 .NET Unit Test Overview"
            echo ""
            echo "| Tests | Passed ✅ | Failed ❌ | Skipped ⏭️ | Duration ⏱️ |"
            echo "|:-----:|:--------:|:--------:|:---------:|:----------:|"
            echo "| **${TEST_TOTAL}** | ${TEST_PASSED} 🟢 | ${TEST_FAILED} 🔴 | ${TEST_SKIPPED} | ${TEST_DURATION} |"
            echo ""

            echo "---"
            echo "*📋 Coverage report generated from commit: \`${{ github.event.pull_request.head.sha || github.sha }}\`*"
          } > coverage-comment.md

          echo "=== Generated PR Comment ==="
          cat coverage-comment.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request_target'
        with:
          header: coverage
          path: coverage-comment.md
        continue-on-error: true

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: 'TestResults/test-results.trx'
          reporter: dotnet-trx
        continue-on-error: true
