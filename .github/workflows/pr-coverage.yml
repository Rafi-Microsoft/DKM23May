name: PR Coverage Check (Universal)

on:
  pull_request:
    types:
      - opened
      - synchronize   # new commits / branch updates
      - reopened
      - edited
      - ready_for_review
      - review_requested

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: pip install --upgrade pip

      # 🔥 Smart dependency installation
      - name: Install dependencies (auto-detect)
        run: |
          pip install pytest pytest-cov

          echo "Checking dependency files..."

          if [ -f pyproject.toml ]; then
            echo "Installing from pyproject.toml"
            pip install .
          fi

          if [ -f requirements.txt ]; then
            echo "Installing root requirements.txt"
            pip install -r requirements.txt
          fi

          find . -name "requirements.txt" -not -path "./.venv/*" | while read req; do
            echo "Installing $req"
            pip install -r $req
          done

      # 🔥 Smart test execution + fallback handling
      - name: Run tests with coverage
        env:
          URL: "https://dummy-url.com"
        run: |
          echo "Running pytest..."

          # Try running all tests first
          pytest --cov=. --cov-report=xml || echo "Retrying without e2e..."

          # If failed, retry skipping e2e tests
          if [ ! -f coverage.xml ]; then
            echo "Skipping e2e tests..."
            pytest --ignore=tests/e2e-test --cov=. --cov-report=xml
          fi

      # 🔥 PR Coverage Comment
      - name: Add Coverage Comment to PR
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./coverage.xml
